<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitemap Tree — LIAG Unicamp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap');
  :root {
    --bg:#07080f; --surface:#0f1018; --border:#1a1b2e;
    --text:#dde4f0; --muted:#3d4460;
    --accent:#00d4ff; --accent2:#ff6b35;
    --leaf:#00ff9d; --coll:#a78bfa;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  header{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0;gap:10px;flex-wrap:wrap;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--accent);white-space:nowrap;}
  .logo span{color:var(--text);opacity:.4;} .logo em{color:var(--accent2);font-style:normal;font-size:11px;margin-left:8px;}
  .stats{font-size:11px;color:var(--muted);display:flex;gap:14px;} .stats b{color:var(--accent);}
  .controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
  .btn{background:var(--border);color:var(--text);border:1px solid #252640;padding:6px 11px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;border-radius:4px;transition:all .15s;white-space:nowrap;}
  .btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  .btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

  #wrap{flex:1;position:relative;overflow:hidden;}
  svg{width:100%;height:100%;cursor:grab;} svg:active{cursor:grabbing;}

  .tree-link{fill:none;stroke:var(--border);stroke-width:1.2px;transition:stroke .2s;}
  .tree-link.hi{stroke:var(--accent);stroke-width:1.8px;opacity:.7;}

  .tree-node{cursor:pointer;}
  .tree-node circle{fill:var(--surface);stroke:var(--accent);stroke-width:1.5px;transition:all .22s;}
  .tree-node.root  circle{stroke:var(--accent2);fill:#ff6b3520;stroke-width:2px;}
  .tree-node.leaf  circle{stroke:var(--leaf);}
  .tree-node.coll  circle{stroke:var(--coll);fill:#a78bfa18;}
  .tree-node:hover circle{stroke:var(--accent2);fill:#ff6b3520;}
  .tree-node.found circle{stroke:#ffe066;fill:#ffe06620;stroke-width:2.5px;}

  .tree-node .lbl{font-size:10px;fill:var(--muted);pointer-events:none;transition:fill .2s;}
  .tree-node:hover .lbl{fill:var(--text);}
  .tree-node.root  .lbl{fill:var(--accent2);font-weight:600;}
  .tree-node.found .lbl{fill:#ffe066;}
  .badge{font-size:8px;fill:var(--coll);pointer-events:none;font-weight:600;}

  #tooltip{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:360px;z-index:20;box-shadow:0 8px 32px #00000099;}
  #tooltip.vis{opacity:1;pointer-events:auto;}
  .tt-title{color:var(--accent);font-weight:600;margin-bottom:3px;word-break:break-all;}
  .tt-url{color:var(--muted);font-size:10px;word-break:break-all;margin-bottom:4px;}
  .tt-meta{color:var(--text);font-size:10px;}
  .tt-btn{display:block;width:100%;margin-top:9px;background:var(--accent);color:var(--bg);border:none;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;transition:background .15s;text-align:center;}
  .tt-btn:hover{background:var(--accent2);}

  #sw{position:absolute;top:12px;right:16px;z-index:10;}
  #si{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 12px;border-radius:4px;width:220px;outline:none;transition:border-color .2s;}
  #si:focus{border-color:var(--accent);} #si::placeholder{color:var(--muted);}

  .zc{position:absolute;bottom:16px;left:16px;display:flex;flex-direction:column;gap:4px;z-index:10;}
  .zb{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
  .zb:hover{background:var(--accent);color:var(--bg);}

  #leg{position:absolute;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:10px;color:var(--muted);z-index:10;display:flex;flex-direction:column;gap:5px;line-height:1.5;}
  .li{display:flex;align-items:center;gap:8px;}
  .ld{width:10px;height:10px;border-radius:50%;border:1.5px solid;flex-shrink:0;}
</style>
</head>
<body>
<header>
  <div class="logo">SITE<span>/</span>MAP <em>liag.ft.unicamp.br</em></div>
  <div class="stats">
    <span>nós: <b id="sn">—</b></span>
    <span>visíveis: <b id="sv">—</b></span>
    <span>profundidade: <b id="sd">—</b></span>
  </div>
  <div class="controls">
    <button class="btn" id="bo">⇅ horizontal</button>
    <button class="btn" id="be">⊞ expandir tudo</button>
    <button class="btn" id="bc">⊟ colapsar tudo</button>
    <button class="btn" id="bx">↓ SVG</button>
  </div>
</header>

<div id="wrap">
  <div id="sw"><input type="text" id="si" placeholder="buscar página..."></div>
  <svg id="svg"></svg>
  <div id="tooltip">
    <div class="tt-title" id="tt-title"></div>
    <div class="tt-url"   id="tt-url"></div>
    <div class="tt-meta"  id="tt-meta"></div>
    <button class="tt-btn" id="tt-btn">↗ abrir página</button>
  </div>
  <div class="zc">
    <button class="zb" id="zi">+</button>
    <button class="zb" id="zo">−</button>
    <button class="zb" id="zf">⊡</button>
  </div>
  <div id="leg">
    <div class="li"><div class="ld" style="border-color:var(--accent2);background:#ff6b3520"></div>raiz</div>
    <div class="li"><div class="ld" style="border-color:var(--accent)"></div>nó interno</div>
    <div class="li"><div class="ld" style="border-color:var(--leaf)"></div>folha</div>
    <div class="li"><div class="ld" style="border-color:var(--coll);background:#a78bfa18"></div>colapsado (+N)</div>
    <div class="li"><div class="ld" style="border-color:#ffe066;background:#ffe06620"></div>busca</div>
    <div style="margin-top:4px;color:#2a2d3e">clique → colapsar/expandir<br>duplo clique · E → abrir URL</div>
  </div>
</div>

21/01/dje020-desafio-2-1/"}, {"id": "httpsliagftunicampbrdje202101dje020desafio13", "title": "", "url": "/dje/2021/01/dje020-desafio-1-3/"}, {"id": "httpsliagftunicampbrdje202101dje020desafio12", "title": "", "url": "/dje/2021/01/dje020-desafio-1-2/"}, {"id": "httpsliagftunicampbrdje202101890", "title": "", "url": "/dje/2021/01/890/"}]}, {"id": "httpsliagftunicampbrdje202012", "title": "dezembro 2020 – Desafio Jovem Engenheiro", "url": "/dje/2020/12/", "children": [{"id": "httpsliagftunicampbrdje2020121olugardotorneiodesafiojovemengenheiro2020", "title": "", "url": "/dje/2020/12/1o-lugar-do-torneio-desafio-jovem-engenheiro-2020/"}, {"id": "httpsliagftunicampbrdje20201201", "title": "", "url": "/dje/2020/12/01/"}]}, {"id": "httpsliagftunicampbrdje202011", "title": "", "url": "/dje/2020/11/"}, {"id": "httpsliagftunicampbrdje202010", "title": "", "url": "/dje/2020/10/"}, {"id": "httpsliagftunicampbrdje201911", "title": "", "url": "/dje/2019/11/"}, {"id": "httpsliagftunicampbrdje201905", "title": "", "url": "/dje/2019/05/"}, {"id": "httpsliagftunicampbrdje201812", "title": "", "url": "/dje/2018/12/"}, {"id": "httpsliagftunicampbrdje201805", "title": "", "url": "/dje/2018/05/"}, {"id": "httpsliagftunicampbrdje201801", "title": "", "url": "/dje/2018/01/"}, {"id": "httpsliagftunicampbrdje201711", "title": "", "url": "/dje/2017/11/"}, {"id": "httpsliagftunicampbrdje201709", "title": "", "url": "/dje/2017/09/"}, {"id": "httpsliagftunicampbrdje201708", "title": "", "url": "/dje/2017/08/"}, {"id": "httpsliagftunicampbrdje201705", "title": "", "url": "/dje/2017/05/"}, {"id": "httpsliagftunicampbrdje201611", "title": "", "url": "/dje/2016/11/"}, {"id": "httpsliagftunicampbrdje201609", "title": "", "url": "/dje/2016/09/"}, {"id": "httpsliagftunicampbrdje201608", "title": "", "url": "/dje/2016/08/"}, {"id": "httpsliagftunicampbrdje201607", "title": "", "url": "/dje/2016/07/"}]}, {"id": "httpsliagftunicampbrdodesafiojovemengenheiroparaaglobo", "title": "", "url": "/do-desafio-jovem-engenheiro-para-a-globo/"}, {"id": "httpsliagftunicampbrdestaquenodesafiojovemengenheiro2025", "title": "", "url": "/destaque-no-desafio-jovem-engenheiro-2025/"}, {"id": "httpsliagftunicampbraula1letramentoemiaparaalunos", "title": "", "url": "/aula-1-letramento-em-ia-para-alunos/"}, {"id": "httpsliagftunicampbrappinventor31", "title": "", "url": "/app-inventor-3-1/"}, {"id": "httpsliagftunicampbrscratch31", "title": "", "url": "/scratch-3-1/"}, {"id": "httpsliagftunicampbrfestivaldeinovacaoecriatividade2edicaoficemjaguariunaumdiadeaprendizadoeinspiracao", "title": "", "url": "/festival-de-inovacao-e-criatividade-2-edicao-fic-em-jaguariuna-um-dia-de-aprendizado-e-inspiracao/"}, {"id": "httpsliagftunicampbrvejaas3tendenciastecnologicaspara2024", "title": "", "url": "/veja-as-3-tendencias-tecnologicas-para-2024/"}, {"id": "httpsliagftunicampbras5melhoresferramentascominteligenciaartificialiaem2023", "title": "", "url": "/as-5-melhores-ferramentas-com-inteligencia-artificial-ia-em-2023/"}, {"id": "httpsliagftunicampbrcoordenadordoliagestanaorganizacaodoworkshopestrategiastransformadoraseinovacaonaeducacao", "title": "", "url": "/coordenador-do-liag-esta-na-organizacao-do-workshop-estrategias-transformadoras-e-inovacao-na-educacao/"}, {"id": "httpsliagftunicampbrbeneficiosdeterumbommodelodetcc", "title": "", "url": "/beneficios-de-ter-um-bom-modelo-de-tcc/"}, {"id": "httpsliagftunicampbrpage2", "title": "", "url": "/page/2/"}]};

const BASE_URL = 'https://liag.ft.unicamp.br';
const NODE_R   = 7;
const DUR      = 350;

let treeRoot = null, svg, gMain, zoomBeh;
let orientation = 'horizontal';
let _hov = null;

function buildUrl(d) {
  const data = d.data || d;
  const path = (data.url || '').replace(/^\/\//, '/');
  if (!path || path === '/') return BASE_URL;
  return path.startsWith('http') ? path : BASE_URL + path;
}
function openNode(d) { window.open(buildUrl(d), '_blank'); }

// collapse helpers
function collapse(d) {
  if (d.children) { d._children = d.children; d._children.forEach(collapse); d.children = null; }
}
function expand(d) {
  if (d._children) { d.children = d._children; d._children = null; d.children.forEach(expand); }
}
function collapseDepth(d, max, cur=0) {
  if (d.children) {
    if (cur >= max) { d._children = d.children; d.children = null; }
    else d.children.forEach(c => collapseDepth(c, max, cur+1));
  }
}
function countDesc(arr) {
  let n = 0;
  function w(a) { a.forEach(c => { n++; if(c._children) w(c._children); if(c.children) w(c.children); }); }
  w(arr); return n;
}

function render(source) {
  const svgEl = document.getElementById('svg');
  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  const isH = orientation === 'horizontal';

  const layout = d3.tree();
  isH ? layout.nodeSize([18, 260]) : layout.nodeSize([26, 110]);
  layout(treeRoot);

  const nodes = treeRoot.descendants();
  const links = treeRoot.links();

  document.getElementById('sv').textContent = nodes.length;

  function px(d) { return isH ? d.y : d.x; }
  function py(d) { return isH ? d.x : d.y; }

  const linkGen = d3.linkVertical()
    .x(d => isH ? d.y : d.x)
    .y(d => isH ? d.x : d.y);

  // links
  const link = gMain.selectAll('.tree-link').data(links, d => d.target.data.id);
  const lEnter = link.enter().append('path').attr('class','tree-link')
    .attr('d', () => { const o={x:source._x0??source.x, y:source._y0??source.y}; return linkGen({source:o,target:o}); });
  link.merge(lEnter).transition().duration(DUR).attr('d', linkGen);
  link.exit().transition().duration(DUR)
    .attr('d', () => { const o={x:source.x,y:source.y}; return linkGen({source:o,target:o}); }).remove();

  // nodes
  const node = gMain.selectAll('.tree-node').data(nodes, d => d.data.id);

  const nEnter = node.enter().append('g')
    .attr('class', d => nodeClass(d))
    .attr('transform', () => `translate(${px(source._x0??source)},${py(source._y0??source)})`)
    .on('click', (e,d) => {
      e.stopPropagation();
      if (d.children) { d._children=d.children; d.children=null; }
      else if (d._children) { d.children=d._children; d._children=null; }
      render(d);
    })
    .on('dblclick', (e,d) => { e.stopPropagation(); openNode(d); })
    .on('mouseover', showTT)
    .on('mousemove', moveTT)
    .on('mouseout',  hideTT);

  nEnter.append('circle').attr('r', NODE_R);
  nEnter.append('text').attr('class','lbl');
  nEnter.append('text').attr('class','badge').attr('dy','0.35em').attr('text-anchor','middle');

  const nMerge = node.merge(nEnter);
  nMerge.transition().duration(DUR)
    .attr('transform', d => `translate(${px(d)},${py(d)})`)
    .attr('class', d => nodeClass(d));

  nMerge.select('.lbl')
    .attr('dy',          isH ? '0.35em' : '1.7em')
    .attr('x',           isH ? 12 : 0)
    .attr('text-anchor', isH ? 'start' : 'middle')
    .text(d => { const t = d.data.title||d.data.id; return t.length>28 ? t.slice(0,26)+'…' : t; });

  nMerge.select('.badge')
    .text(d => d._children ? `+${countDesc(d._children)}` : '');

  node.exit().transition().duration(DUR)
    .attr('transform', `translate(${px(source)},${py(source)})`).remove();

  nodes.forEach(d => { d._x0=d.x; d._y0=d.y; });
}

function nodeClass(d) {
  let c = 'tree-node';
  if (!d.parent)  c += ' root';
  else if (d._children) c += ' coll';
  else if (!d.children) c += ' leaf';
  return c;
}

function setupSvg() {
  const el = document.getElementById('svg');
  el.innerHTML = '';
  svg = d3.select('#svg');
  zoomBeh = d3.zoom().scaleExtent([0.02,8]).on('zoom', e => gMain.attr('transform', e.transform));
  svg.call(zoomBeh);
  svg.on('click', hideTT);
  gMain = svg.append('g');
}

function fitView() {
  if (!gMain||!svg) return;
  const el = document.getElementById('svg');
  const W=el.clientWidth, H=el.clientHeight;
  const b = gMain.node().getBBox();
  if (!b.width||!b.height) return;
  const sc = Math.min(W/(b.width+80), H/(b.height+80));
  const tx = W/2 - sc*(b.x+b.width/2);
  const ty = H/2 - sc*(b.y+b.height/2);
  svg.transition().duration(500).call(zoomBeh.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
}

// ── tooltip ──
const tooltip = document.getElementById('tooltip');
document.getElementById('tt-btn').addEventListener('click', e => { e.stopPropagation(); if(_hov) openNode(_hov); });

function showTT(e,d) {
  _hov = d;
  document.getElementById('tt-title').textContent = d.data.title || d.data.id;
  document.getElementById('tt-url').textContent   = buildUrl(d);
  const kids = (d.children?.length||0)+(d._children?.length||0);
  document.getElementById('tt-meta').textContent  = `profundidade ${d.depth}  ·  ${kids} filhos  ·  E ou duplo clique para abrir`;
  tooltip.classList.add('vis');
  moveTT(e);
}
function moveTT(e) { tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-10)+'px'; }
function hideTT()  { tooltip.classList.remove('vis'); }

// ── search ──
document.getElementById('si').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  gMain.selectAll('.tree-node').classed('found', d =>
    q && ((d.data.title||'').toLowerCase().includes(q)||(d.data.url||'').toLowerCase().includes(q))
  );
});

// ── keyboard ──
document.addEventListener('keydown', e => {
  if (document.activeElement===document.getElementById('si')) return;
  if (e.key==='e'||e.key==='E') { if(_hov) openNode(_hov); }
});

// ── controls ──
document.getElementById('bo').addEventListener('click', function() {
  orientation = orientation==='vertical' ? 'horizontal' : 'vertical';
  this.textContent = orientation==='vertical' ? '⇅ horizontal' : '⇆ vertical';
  if (treeRoot) { render(treeRoot); setTimeout(fitView, DUR+50); }
});
document.getElementById('be').addEventListener('click', () => {
  if (!treeRoot) return;
  expand(treeRoot); render(treeRoot); setTimeout(fitView, DUR+50);
});
document.getElementById('bc').addEventListener('click', () => {
  if (!treeRoot) return;
  if (treeRoot.children) treeRoot.children.forEach(collapse);
  render(treeRoot); setTimeout(fitView, DUR+50);
});
document.getElementById('bx').addEventListener('click', () => {
  const el = document.getElementById('svg');
  const blob = new Blob([el.outerHTML],{type:'image/svg+xml'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='sitemap-tree.svg'; a.click();
});
document.getElementById('zi').addEventListener('click', () => svg?.transition().call(zoomBeh.scaleBy, 1.4));
document.getElementById('zo').addEventListener('click', () => svg?.transition().call(zoomBeh.scaleBy, 0.7));
document.getElementById('zf').addEventListener('click', fitView);

// ── boot ──
(function init() {
  treeRoot = d3.hierarchy(TREE_DATA);
  const all = treeRoot.descendants();
  document.getElementById('sn').textContent = all.length;
  document.getElementById('sd').textContent = d3.max(all, d => d.depth);

  // Start with 2 levels expanded
  collapseDepth(treeRoot, 2);

  setupSvg();
  render(treeRoot);
  setTimeout(fitView, 100);
})();
</script>
</body>
</html>
